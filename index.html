<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StencilDesigner2</title>
    <style>
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #ffffff;
      }
      #toolbar {
        position: absolute; top: 10px; left: 10px; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; display: flex; gap: 10px; align-items: center;
      }
      .tool-btn {
        padding: 5px 10px; border: 1px solid #ccc; background: #f9f9f9; cursor: pointer; display: flex; align-items: center; gap: 5px; border-radius: 3px;
      }
      .tool-btn:hover { background: #eee; }
      .tool-btn.active { background: #d0f0ff; border-color: #00aa88; }
      .icon-placeholder { width: 16px; height: 16px; background: #333; border-radius: 3px; display: inline-block; }
      #main-canvas { display: block; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-select" class="tool-btn active">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
      </button>
      <button id="btn-line" class="tool-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button id="btn-rect" class="tool-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
      </button>
      <button id="btn-trim" class="tool-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </button>
      <div style="margin-left: 20px;">
        <span id="status-text" style="font-size:12px;color:#555;">Ready</span>
      </div>
    </div>
    <canvas id="main-canvas" resize="true"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
