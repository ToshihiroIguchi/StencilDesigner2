<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StencilDesigner2 | High Precision Stencil CAD</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="toolbar">
        <div style="font-weight:900; color:var(--accent-blue); margin-right:20px; font-size:18px; letter-spacing:-0.02em;">SD<span style="color:white; font-weight:300;">2</span></div>
        
        <div class="tool-group">
            <button id="btn-undo" class="tool-btn" title="Undo (Ctrl+Z)">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
            </button>
            <button id="btn-redo" class="tool-btn" title="Redo (Ctrl+Y)">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
            </button>
        </div>

        <div class="tool-group">
            <button id="btn-select" class="tool-btn active" title="Select Tool">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
            </button>
        </div>

        <div class="tool-group">
            <button id="btn-line" class="tool-btn" title="Line Tool">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="btn-rect" class="tool-btn" title="Rectangle Tool">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
            </button>
        </div>

        <div class="tool-group">
            <button id="btn-trim" class="tool-btn" title="Trim Tool">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </button>
            <button id="btn-fillet" class="tool-btn" title="Fillet Tool">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20v-4a4 4 0 0 1 4-4h12"/></svg>
            </button>
            <button id="btn-dim" class="tool-btn" title="Dimension Tool">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="20" x2="19" y2="4"/><line x1="5" y1="20" x2="5" y2="4"/><line x1="19" y1="12" x2="5" y2="12"/><polyline points="15 16 19 12 15 8"/><polyline points="9 8 5 12 9 16"/></svg>
            </button>
        </div>

        <div style="margin-left:auto; display:flex; gap:12px;">
            <button id="btn-export-dxf" class="export-btn dxf">Export DXF</button>
            <button id="btn-export-svg" class="export-btn svg">Export SVG</button>
        </div>
    </div>
    
    <div id="status-bar">
        <span id="status-text">Ready</span>
    </div>
    
    <div id="property-panel">
        <div class="panel-header">Properties</div>
        
        <div id="info-content" class="panel-section">
            <p>Select an item to see properties</p>
        </div>
        
        <div class="panel-section">
            <div class="section-title">Array Copy</div>
            <div class="input-group">
                <label>Rows</label><input id="array-rows" type="number" value="2">
            </div>
            <div class="input-group">
                <label>Cols</label><input id="array-cols" type="number" value="3">
            </div>
            <div class="input-group">
                <label>Pitch X</label><input id="array-px" type="number" value="10">
            </div>
            <div class="input-group">
                <label>Pitch Y</label><input id="array-py" type="number" value="-10">
            </div>
            <button id="btn-array-exec" style="width:100%; padding:8px; margin-top:8px; background:var(--accent-blue); color:white; border:none; border-radius:6px; font-weight:600; cursor:pointer;">Exec Array</button>
        </div>
        
        <div class="panel-section">
            <div class="section-title">Fillet Tool</div>
            <div class="input-group">
                <label>Radius (mm)</label><input id="fillet-radius" type="number" value="2" step="0.5">
            </div>
        </div>
    </div>

    <canvas id="grid-canvas"></canvas>
    <canvas id="main-canvas" resize="true"></canvas>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
